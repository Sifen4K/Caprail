<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScreenshotTool</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <div id="app">
    <div class="placeholder">
      <h1>ScreenshotTool</h1>
      <p>Screenshot & Recording Tool</p>
      <p id="status" data-i18n="appShell.status">Ready</p>
      <div class="hint">
        <p data-i18n="appShell.hint.tray">Right-click the tray icon to start.</p>
        <p data-i18n="appShell.hint.shortcuts">Default shortcuts:</p>
        <ul>
          <li><span data-i18n="appShell.hint.screenshot">Screenshot:</span> <kbd>Ctrl+Shift+A</kbd></li>
          <li><span data-i18n="appShell.hint.record">Record:</span> <kbd>Ctrl+Shift+R</kbd></li>
        </ul>
      </div>
    </div>
  </div>
  <script type="module">
    import { loadLocale } from "./scripts/i18n.ts";
    const params = new URLSearchParams(window.location.search);
    loadLocale(params.get("lang") || "en");
    import("./scripts/main.ts");
  </script>
</body>
</html>
