<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScreenshotTool</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <div id="app">
    <div class="placeholder">
      <h1>ScreenshotTool</h1>
      <p>Screenshot & Recording Tool</p>
      <p id="status">Ready</p>
      <div class="hint">
        <p>Right-click the tray icon to start.</p>
        <p>Default shortcuts:</p>
        <ul>
          <li>Screenshot: <kbd>Ctrl+Shift+A</kbd></li>
          <li>Record: <kbd>Ctrl+Shift+R</kbd></li>
        </ul>
      </div>
    </div>
  </div>
  <script type="module" src="./scripts/main.ts"></script>
</body>
</html>
