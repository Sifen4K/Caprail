<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Recording Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    #video-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      overflow: hidden;
    }
    canvas {
      max-width: 100%;
      max-height: 100%;
    }
    #controls {
      padding: 12px 16px;
      background: #2a2a2a;
      border-top: 1px solid #444;
    }
    #timeline {
      --timeline-height: 40px;
      --timeline-radius: 4px;
      --trim-handle-visual-width: 8px;
      --trim-handle-hit-outset: 6px;
      --timeline-track-bg: #333;
      --timeline-progress-bg: rgba(76, 175, 80, 0.3);
      --timeline-playhead-color: #4CAF50;
      --trim-handle-bg: #ff9800;
      --trim-region-bg: rgba(255, 152, 0, 0.1);
      position: relative;
      height: var(--timeline-height);
      margin-bottom: 10px;
      cursor: pointer;
      overflow: visible;
      user-select: none;
    }
    #timeline-track {
      position: absolute;
      top: 0;
      bottom: 0;
      background: var(--timeline-track-bg);
      border-radius: var(--timeline-radius);
      pointer-events: none;
    }
    #timeline-progress {
      position: absolute;
      top: 0;
      height: 100%;
      background: var(--timeline-progress-bg);
      pointer-events: none;
      z-index: 1;
    }
    #timeline-playhead {
      position: absolute;
      top: 0;
      width: 2px;
      height: 100%;
      background: var(--timeline-playhead-color);
      pointer-events: none;
      z-index: 5;
    }
    .trim-handle {
      position: absolute;
      top: 0;
      width: calc(var(--trim-handle-visual-width) + var(--trim-handle-hit-outset));
      height: 100%;
      cursor: ew-resize;
      z-index: 4;
    }
    .trim-handle-visual {
      position: absolute;
      top: 0;
      width: var(--trim-handle-visual-width);
      height: 100%;
      background: var(--trim-handle-bg);
      pointer-events: none;
    }
    #trim-start { left: 0; }
    #trim-start .trim-handle-visual {
      right: 0;
      border-radius: var(--timeline-radius) 0 0 var(--timeline-radius);
    }
    #trim-end { left: 100%; }
    #trim-end .trim-handle-visual {
      left: 0;
      border-radius: 0 var(--timeline-radius) var(--timeline-radius) 0;
    }
    .trim-region {
      position: absolute;
      top: 0;
      height: 100%;
      background: var(--trim-region-bg);
      pointer-events: auto;
      cursor: pointer;
      z-index: 1;
    }
    #control-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ctrl-btn {
      padding: 6px 12px;
      border: 1px solid #555;
      border-radius: 4px;
      background: transparent;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
    }
    .ctrl-btn:hover { background: #3a3a3a; }
    .ctrl-btn.primary { background: #4CAF50; border-color: #4CAF50; }
    .ctrl-btn.primary:hover { background: #388E3C; }
    select {
      background: #333;
      color: #fff;
      border: 1px solid #555;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .audio-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #ddd;
      white-space: nowrap;
    }
    .audio-toggle input {
      accent-color: #4CAF50;
    }
    .audio-toggle:has(input:disabled) {
      color: #777;
    }
    #time-display {
      font-family: monospace;
      font-size: 13px;
      color: #aaa;
    }
    .spacer { flex: 1; }
    #export-progress {
      display: none;
      margin-top: 8px;
      height: 4px;
      background: #333;
      border-radius: 2px;
      overflow: hidden;
    }
    #export-progress-bar {
      height: 100%;
      background: #4CAF50;
      width: 0%;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <div id="video-container">
    <canvas id="player-canvas"></canvas>
  </div>
  <div id="controls">
    <div id="timeline">
      <div id="timeline-track"></div>
      <div class="trim-region" id="trim-region"></div>
      <div id="timeline-progress"></div>
      <div id="timeline-playhead"></div>
      <div class="trim-handle" id="trim-start">
        <div class="trim-handle-visual" id="trim-start-visual"></div>
      </div>
      <div class="trim-handle" id="trim-end">
        <div class="trim-handle-visual" id="trim-end-visual"></div>
      </div>
    </div>
    <div id="control-row">
      <button class="ctrl-btn" id="play-btn">▶</button>
      <span id="time-display">00:00 / 00:00</span>
      <label><span data-i18n="clipEditor.speed">Speed:</span>
        <select id="speed-select">
          <option value="0.5">0.5x</option>
          <option value="1" selected>1x</option>
          <option value="1.5">1.5x</option>
          <option value="2">2x</option>
          <option value="4">4x</option>
        </select>
      </label>
      <label class="audio-toggle">
        <input type="checkbox" id="system-audio-toggle" checked>
        <span data-i18n="clipEditor.systemAudio">System Audio</span>
      </label>
      <label class="audio-toggle">
        <input type="checkbox" id="mic-audio-toggle" checked>
        <span data-i18n="clipEditor.microphone">Mic</span>
      </label>
      <div class="spacer"></div>
      <button class="ctrl-btn primary" id="export-mp4-btn" data-i18n="clipEditor.exportMp4">Export MP4</button>
      <button class="ctrl-btn" id="export-gif-btn" data-i18n="clipEditor.exportGif">Export GIF</button>
    </div>
    <div id="export-progress">
      <div id="export-progress-bar"></div>
    </div>
  </div>
  <script type="module">
    import { loadLocale } from "./scripts/i18n.ts";
    const params = new URLSearchParams(window.location.search);
    loadLocale(params.get("lang") || "en");
    import("./scripts/clip-editor.ts");
  </script>
</body>
</html>
