<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Recording Indicator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: transparent;
      pointer-events: none;
    }
    #border-frame {
      position: fixed;
      inset: 0;
      border: 2px solid #4caf50;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.3);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="border-frame"></div>
  <script type="module" src="./scripts/record-indicator.ts"></script>
</body>
</html>
