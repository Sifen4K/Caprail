<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annotation Editor</title>
  <link rel="stylesheet" href="./styles/editor.css">
</head>
<body>
  <div id="editor-container">
    <div id="toolbar">
      <div class="tool-group">
        <button class="tool-btn active" data-tool="rect" title="矩形">▭</button>
        <button class="tool-btn" data-tool="ellipse" title="椭圆">○</button>
        <button class="tool-btn" data-tool="arrow" title="箭头">→</button>
        <button class="tool-btn" data-tool="pen" title="画笔">✎</button>
        <button class="tool-btn" data-tool="text" title="文字">A</button>
        <button class="tool-btn" data-tool="mosaic" title="马赛克">▦</button>
        <button class="tool-btn" data-tool="blur" title="模糊">◎</button>
        <button class="tool-btn" data-tool="stamp" title="记号">①</button>
      </div>
      <div class="tool-group">
        <input type="color" id="color-picker" value="#ff0000" title="颜色">
        <input type="range" id="line-width" min="1" max="10" value="2" title="线宽">
        <input type="range" id="font-size" min="12" max="48" value="16" title="字号" style="display:none">
      </div>
      <div class="tool-group">
        <button class="action-btn" id="undo-btn" title="撤销 (Ctrl+Z)">↩</button>
        <button class="action-btn" id="redo-btn" title="重做 (Ctrl+Y)">↪</button>
      </div>
      <div class="tool-group">
        <button class="action-btn" id="copy-btn" title="复制到剪贴板 (Ctrl+C)">📋</button>
        <button class="action-btn" id="save-btn" title="保存 (Ctrl+S)">💾</button>
        <button class="action-btn" id="pin-btn" title="钉在屏幕上">📌</button>
        <button class="action-btn" id="ocr-btn" title="提取文字">🔤</button>
      </div>
    </div>
    <div id="canvas-wrapper">
      <canvas id="editor-canvas"></canvas>
    </div>
    <div id="ocr-panel" style="display:none">
      <div id="ocr-header">
        <span>OCR Results</span>
        <button id="ocr-copy-btn">Copy All</button>
        <button id="ocr-close-btn">✕</button>
      </div>
      <textarea id="ocr-text" readonly></textarea>
    </div>
  </div>
  <div id="text-input-overlay" style="display:none">
    <textarea id="text-input"></textarea>
  </div>
  <div id="stamp-menu" style="display:none">
    <button class="stamp-btn" data-stamp="counter">①</button>
    <button class="stamp-btn" data-stamp="check">✓</button>
    <button class="stamp-btn" data-stamp="cross">✗</button>
    <button class="stamp-btn" data-stamp="star">★</button>
  </div>
  <script type="module" src="./scripts/editor.ts"></script>
</body>
</html>
