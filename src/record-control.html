<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Recording</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      overflow: hidden;
      cursor: move;
    }
    #control-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(30, 30, 30, 0.95);
      border: 1px solid #444;
      border-radius: 8px;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      font-size: 14px;
    }
    .rec-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f44336;
      animation: blink 1s infinite;
    }
    .rec-dot.paused {
      animation: none;
      background: #ff9800;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    #duration {
      font-family: monospace;
      min-width: 60px;
    }
    .ctrl-btn {
      width: 28px;
      height: 28px;
      border: 1px solid #555;
      border-radius: 4px;
      background: transparent;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ctrl-btn:hover { background: #444; }
    .ctrl-btn.stop { background: #f44336; border-color: #f44336; }
    .ctrl-btn.stop:hover { background: #d32f2f; }
  </style>
</head>
<body>
  <div id="control-bar">
    <div class="rec-dot" id="rec-dot"></div>
    <span id="duration">00:00</span>
    <button class="ctrl-btn" id="pause-btn" title="暂停/恢复">⏸</button>
    <button class="ctrl-btn stop" id="stop-btn" title="停止录制">⏹</button>
  </div>
  <script type="module" src="./scripts/record-control.ts"></script>
</body>
</html>
